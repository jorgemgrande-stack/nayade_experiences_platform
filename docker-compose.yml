version: "3.9"

# ============================================================
# docker-compose.yml — Nayade Experiences Platform
#
# Servicios incluidos:
#   db      → MySQL 8.0 (base de datos principal)
#   minio   → MinIO (almacenamiento S3-compatible, opcional)
#   app     → Servidor Node.js + cliente Vite en modo desarrollo
#
# Uso rápido:
#   docker compose up -d db minio   # solo infraestructura
#   pnpm dev                        # servidor en tu máquina local
#
# O todo en Docker:
#   docker compose up -d
# ============================================================

services:

  # ─── Base de datos MySQL ───────────────────────────────────
  db:
    image: mysql:8.0
    container_name: nayade_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: nayade_db
      MYSQL_USER: nayade
      MYSQL_PASSWORD: nayade_pass
    ports:
      - "3306:3306"
    volumes:
      - nayade_db_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "nayade", "-pnayade_pass"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MinIO (S3 local) ─────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: nayade_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Consola web (http://localhost:9001)
    volumes:
      - nayade_minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─── Aplicación Node.js ───────────────────────────────────
  # Nota: para desarrollo local es más cómodo ejecutar `pnpm dev` directamente.
  # Este servicio es útil para pruebas de integración o despliegue en servidor.
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nayade_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: mysql://nayade:nayade_pass@db:3306/nayade_db
      LOCAL_AUTH: "true"
      JWT_SECRET: ${JWT_SECRET:-cambia-esto-en-produccion}
      PORT: 3000
      # Storage
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: nayade-media
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_PUBLIC_URL: http://localhost:9000/nayade-media
      # Email
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      NOTIFY_EMAIL: ${NOTIFY_EMAIL:-}
      # Redsys
      REDSYS_ENVIRONMENT: ${REDSYS_ENVIRONMENT:-test}
      REDSYS_MERCHANT_CODE: ${REDSYS_MERCHANT_CODE:-}
      REDSYS_MERCHANT_KEY: ${REDSYS_MERCHANT_KEY:-}
      REDSYS_MERCHANT_TERMINAL: ${REDSYS_MERCHANT_TERMINAL:-1}
      # LLM (opcional)
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      # Google Maps (opcional)
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
    volumes:
      - /tmp/local-storage:/tmp/local-storage

volumes:
  nayade_db_data:
  nayade_minio_data:
